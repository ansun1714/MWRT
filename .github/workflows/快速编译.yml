name: 🏗️ DONGZAI 固件编译(显示内核) - 快速增量 / 完全重编译

on:
  workflow_dispatch:
    inputs:
      device:
        description: '📦 目标设备'
        required: true
        default: 'wh3000pro'
        type: choice
        options:
          - wh3000
          - wh3000pro
          - re-sp-01b
      build_mode:
        description: '⚡ 编译模式'
        required: true
        default: 'fast'
        type: choice
        options:
          - fast
          - clean

env:
  LEDE_REPO:   https://github.com/coolsnowwolf/lede
  LEDE_BRANCH: master

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      # ... 前面的步骤保持不变（环境初始化、克隆、配置等） ...

      # ---------- 编译前设置 ccache 容量 ----------
      - name: ⚙️ 配置 ccache（增大缓存容量）
        run: |
          sudo apt-get install -y ccache
          ccache -M 5G           # 设置最大 5GB
          ccache -z              # 零统计
          echo "CCACHE_MAXSIZE=5G" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV

      # ---------- 恢复缓存（仅 fast 模式）----------
      - name: ♻️ 恢复 ccache 缓存
        if: github.event.inputs.build_mode == 'fast'
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ github.event.inputs.device }}-${{ steps.cache_hash.outputs.config_hash }}-${{ steps.cache_hash.outputs.diy_hash }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ github.event.inputs.device }}-

      # ... 其他缓存恢复（dl、build_dir） ...

      # ---------- 编译固件 ----------
      - name: 🔨 编译固件
        run: |
          cd openwrt
          export PATH="/usr/lib/ccache:$PATH"
          export CCACHE_DIR=~/.ccache
          ccache -s   # 显示命中率
          if [ "${{ github.event.inputs.build_mode }}" = "clean" ]; then
            make clean
          fi
          make -j$(nproc) V=s 2>&1 | tee /tmp/build.log | grep -E "^make\[[0-9]+\]|ERROR:|error:" || true
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            make -j1 V=s 2>&1 | tail -150
            exit 1
          fi
          ccache -s

      # ========== 立即发布固件（不等待保存缓存） ==========
      - name: 🔍 获取完整内核版本
        id: kernel
        run: |
          cd openwrt
          KERNEL=$(make kernelversion 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "")
          if [ -z "$KERNEL" ]; then
            KERNEL=$(find build_dir -type d -name "linux-*" 2>/dev/null | sed 's#^.*/linux-##' | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+' | sort -V | tail -1)
          fi
          if [ -z "$KERNEL" ]; then
            MAJOR_MINOR=$(grep "^CONFIG_LINUX_[0-9_]*=y" .config | head -1 | sed 's/CONFIG_LINUX_//' | sed 's/=y//' | tr '_' '.')
            [ -n "$MAJOR_MINOR" ] && KERNEL="${MAJOR_MINOR}.*" || KERNEL="Unknown"
          fi
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date '+%Y-%m-%d %H:%M UTC')
          echo "kernel=$KERNEL" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "build_time=$BUILD_TIME" >> "$GITHUB_OUTPUT"
          echo "━━━━━━━━━━━━━━━━━━━━━━━"
          echo "完整内核版本 : $KERNEL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━"

      - name: 📁 整理固件
        id: organize
        run: |
          mkdir -p upload
          find openwrt/bin/targets/ -type f \( -name "*.bin" -o -name "*.img.gz" -o -name "*.itb" -o -name "*.tar" \) -exec cp {} upload/ \;
          cd upload
          for f in *; do
            newname=$(echo "$f" | sed 's/openwrt/DONGZAI/g; s/lede/DONGZAI/g')
            [ "$f" != "$newname" ] && mv "$f" "$newname"
          done
          ls -lh
          if [ -z "$(ls -A .)" ]; then
            echo "⚠️ 警告：未找到固件文件"
            exit 1
          fi
          echo "✅ 固件整理完成，共 $(ls | wc -l) 个文件"

      - name: 📤 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DONGZAI_${{ github.event.inputs.device }}_K${{ steps.kernel.outputs.kernel }}_${{ github.run_number }}
          path: upload/
          retention-days: 30

      - name: 🏷️ 生成 Release 标签
        id: tag
        run: |
          DEVICE="${{ github.event.inputs.device }}"
          DATE=$(date +'%Y-%m-%d')
          TIME=$(date +'%H%M')
          KERNEL="${{ steps.kernel.outputs.kernel }}"
          TAG="DONGZAI-${DEVICE^^}-K${KERNEL}-$(date +'%Y.%m.%d')-${TIME}"
          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_date=$DATE" >> "$GITHUB_OUTPUT"
          echo "生成 Tag：$TAG"

      - name: 🚀 发布到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "🏗️ DONGZAI · ${{ github.event.inputs.device }} · Linux ${{ steps.kernel.outputs.kernel }}"
          files: upload/*
          body: |
            ## 🏗️ DONGZAI 固件工厂
            | 项目 | 内容 |
            |---|---|
            | 📦 设备 | ${{ github.event.inputs.device }} |
            | 🐧 Linux 内核 | ${{ steps.kernel.outputs.kernel }} |
            | 🔖 LEDE Commit | ${{ steps.kernel.outputs.commit }} |
            | 🕐 编译时间 | ${{ steps.kernel.outputs.build_time }} |
            | 📅 编译日期 | ${{ steps.tag.outputs.release_date }} |
            | 🔖 标识 | DONGZAI |
            | ⚡ 编译模式 | ${{ github.event.inputs.build_mode }} |
            ### 固件文件说明
            | 文件 | 用途 |
            |---|---|
            | `*-initramfs-kernel.bin` | 首次刷机 / TFTP 恢复 |
            | `*-squashfs-sysupgrade.bin` | ✅ 日常升级固件（推荐） |
            ### 刷机注意
            - 首次刷入请先备份原厂固件
            - 建议使用 `sysupgrade` 命令升级，勿勾选保留配置
            ---
            🤖 由 GitHub Actions 自动编译 · DONGZAI 固件工厂
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ========== 最后才保存缓存（不影响发布） ==========
      - name: 💾 保存 feeds 缓存
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            openwrt/feeds
            openwrt/package/feeds
          key: feeds-${{ runner.os }}-${{ github.event.inputs.device }}-${{ steps.cache_hash.outputs.config_hash }}

      - name: 💾 保存 dl 缓存
        if: always()
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: dl-${{ runner.os }}-${{ github.event.inputs.device }}

      - name: 💾 保存编译目录缓存
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            openwrt/build_dir
            openwrt/staging_dir
            openwrt/tmp
          key: build-${{ runner.os }}-${{ github.event.inputs.device }}-${{ steps.cache_hash.outputs.config_hash }}-${{ steps.cache_hash.outputs.diy_hash }}

      - name: 💾 保存 ccache 缓存
        if: always()
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ github.event.inputs.device }}-${{ steps.cache_hash.outputs.config_hash }}-${{ steps.cache_hash.outputs.diy_hash }}
